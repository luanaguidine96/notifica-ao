<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OneSignal - Notificações</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "c3d82911-2678-4685-8e6e-671249fc01d8",
        promptOptions: {
          slidedown: {
            prompts: [{
              type: "push",
              autoPrompt: true,
              text: {
                actionMessage: "Quer receber notificações?",
                acceptButton: "Permitir",
                cancelButton: "Agora não",
              },
              delay: { pageViews: 1, timeDelay: 1 },
            }]
          }
        },
      });

      // Registra o Service Worker manualmente
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log("SW registrado:", reg.scope);

          // Aguarda 30s e dispara via Service Worker
          setTimeout(() => {
            reg.showNotification("🔔 Lembrete!", {
              body: "Já passaram 30 segundos desde que você entrou!",
              icon: "https://onesignal.com/images/notification_logo.png",
              badge: "https://onesignal.com/images/notification_logo.png",
              vibrate: [200, 100, 200],
            });

            document.getElementById('status').textContent = "📨 Notificação disparada!";
            document.getElementById('status').className = "status-ok";
            document.getElementById('contador').textContent = "🔔";
          }, 30000);

        }).catch(err => {
          document.getElementById('status').textContent = "❌ Erro no SW: " + err;
          document.getElementById('status').className = "status-err";
        });
      }
    });
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 24px;
    }
    h1 { font-size: 1.8rem; color: #e879f9; }
    p  { color: #aaa; font-size: 0.95rem; text-align: center; max-width: 420px; }
    #contador { font-size: 3.5rem; font-weight: bold; color: #e879f9; }
    #barra-wrap {
      width: 320px; height: 8px;
      background: #2a2a2a; border-radius: 99px; overflow: hidden;
    }
    #barra {
      height: 100%; width: 100%;
      background: #e879f9; border-radius: 99px;
      transform-origin: left;
      animation: encolher 30s linear forwards;
    }
    @keyframes encolher {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
    #status {
      padding: 12px 20px; border-radius: 8px;
      font-size: 0.9rem; min-width: 300px; text-align: center;
    }
    .status-ok  { background: #14532d; color: #4ade80; }
    .status-err { background: #450a0a; color: #f87171; }
    .status-inf { background: #1e3a5f; color: #60a5fa; }
  </style>
</head>
<body>
  <h1>🔔 Notificação em 30s</h1>
  <p>Permita as notificações. Após 30 segundos você receberá uma notificação mesmo com a aba em segundo plano.</p>

  <div id="contador">30</div>
  <div id="barra-wrap"><div id="barra"></div></div>
  <div id="status" class="status-inf">⏳ Aguardando permissão...</div>

  <script>
    let segundos = 30;
    const contadorEl = document.getElementById('contador');
    const intervalo = setInterval(() => {
      segundos--;
      contadorEl.textContent = segundos;
      if (segundos <= 0) clearInterval(intervalo);
    }, 1000);
  </script>
</body>
</html>
