<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OneSignal - Notificações</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "c3d82911-2678-4685-8e6e-671249fc01d8",
        serviceWorkerPath: "/sw.js",
        promptOptions: {
          slidedown: {
            prompts: [{
              type: "push",
              autoPrompt: true,
              text: {
                actionMessage: "Quer receber notificações?",
                acceptButton: "Permitir",
                cancelButton: "Agora não",
              },
              delay: { pageViews: 1, timeDelay: 1 },
            }]
          }
        },
      });

      // Verifica se o usuário já permitiu
      const permission = await OneSignal.Notifications.permission;
      if (permission) {
        document.getElementById('status').textContent = "✅ Notificações ativadas! Envie um teste pelo painel do OneSignal.";
        document.getElementById('status').className = "status-ok";
      }

      OneSignal.Notifications.addEventListener('permissionChange', (granted) => {
        if (granted) {
          document.getElementById('status').textContent = "✅ Permissão concedida! Envie um teste pelo painel do OneSignal.";
          document.getElementById('status').className = "status-ok";
        } else {
          document.getElementById('status').textContent = "❌ Permissão negada.";
          document.getElementById('status').className = "status-err";
        }
      });
    });
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 24px;
    }
    h1 { font-size: 1.8rem; color: #e879f9; }
    p  { color: #aaa; font-size: 0.95rem; text-align: center; max-width: 420px; }
    #icon { font-size: 3.5rem; }
    #status {
      padding: 12px 20px; border-radius: 8px;
      font-size: 0.9rem; min-width: 300px; text-align: center;
    }
    .status-ok  { background: #14532d; color: #4ade80; }
    .status-err { background: #450a0a; color: #f87171; }
    .status-inf { background: #1e3a5f; color: #60a5fa; }
    .tip {
      background: #1a1a2e;
      border: 1px solid #e879f933;
      border-radius: 10px;
      padding: 16px 20px;
      max-width: 420px;
      font-size: 0.85rem;
      color: #ccc;
      line-height: 1.6;
    }
    .tip strong { color: #e879f9; }
  </style>
</head>
<body>
  <h1>🔔 Push Notifications</h1>
  <p>Permita as notificações e envie um teste pelo painel do OneSignal.</p>

  <div id="icon">🔔</div>
  <div id="status" class="status-inf">⏳ Aguardando permissão...</div>

  <div class="tip">
    <strong>Como testar:</strong><br>
    1. Permita as notificações acima<br>
    2. Acesse <strong>onesignal.com → New Push</strong><br>
    3. Envie para "All Users"<br>
    4. A notificação chegará no seu celular ✅
  </div>
</body>
</html>
